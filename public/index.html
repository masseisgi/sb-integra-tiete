<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#1a7a2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SB Integra"/>
<link rel="manifest" href="/manifest.json"/>
<title>Consórcio SB – Controle de Validades</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f8f5;min-height:100vh;color:#1a2e1e;}
button{cursor:pointer;font-family:inherit;}
button:active{opacity:.75;}
input,select{font-family:inherit;}
input::placeholder{color:#aac0b0;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#c0d9c5;border-radius:3px;}
#header{background:#fff;box-shadow:0 2px 16px rgba(13,115,200,.12);position:sticky;top:0;z-index:100;}
#header img.banner{width:100%;display:block;max-height:110px;object-fit:cover;object-position:center;}
#tabs{display:flex;border-bottom:3px solid #e8f0ea;}
.tab{flex:1;background:#fff;border:none;border-bottom:3px solid transparent;padding:10px 4px;text-align:center;margin-bottom:-3px;}
.tab.active{background:#f4f8f5;border-bottom-color:#1a7a2e;}
.tab .ti{font-size:17px;display:block;}
.tab .tl{font-size:9px;font-weight:700;color:#7a9c82;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;display:block;}
.tab.active .tl{color:#1a7a2e;}
#content{max-width:860px;margin:0 auto;padding:18px 14px 80px;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.sc{border-radius:10px;padding:12px 6px;text-align:center;}
.sc .sv{font-size:22px;font-weight:900;}
.sc .sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.ph{margin-bottom:14px;}
.pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pi{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.pti{font-weight:800;font-size:15px;color:#1a2e1e;font-family:Georgia,serif;}
.pts{font-size:11px;color:#7a9c82;margin-top:1px;}
.btn-add{border:none;border-radius:8px;padding:8px 16px;color:#fff;font-weight:700;font-size:12px;}
.sb{width:100%;background:#f4f8f5;border:1px solid #e8f0ea;border-radius:9px;padding:9px 14px;font-size:13px;color:#1a2e1e;outline:none;}
.card{background:#fff;border:1px solid #e8f0ea;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 3px 12px rgba(0,0,0,.06);border-left-width:4px;}
.cr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;}
.cl{flex:1;min-width:160px;}
.cri{text-align:right;min-width:110px;}
.ct{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.tag{padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;}
.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid transparent;}
.cn{font-weight:800;font-size:14px;color:#1a2e1e;margin-bottom:3px;}
.cs{font-size:12px;color:#3d5c42;}
.cn2{font-size:11px;color:#7a9c82;margin-top:2px;font-style:italic;}
.dl{font-size:11px;color:#7a9c82;}
.dv{font-weight:700;font-size:14px;color:#1a2e1e;margin-top:2px;}
.ca{display:flex;gap:6px;margin-top:8px;justify-content:flex-end;}
.be{background:#f4f8f5;border:none;border-radius:7px;padding:6px 11px;font-size:13px;}
.bd{background:#fef2f2;border:none;border-radius:7px;padding:6px 11px;font-size:13px;color:#dc2626;}
.empty{text-align:center;padding:48px 20px;color:#7a9c82;}
.loading{text-align:center;padding:32px;color:#7a9c82;font-size:14px;}
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
#mo.open{display:flex;}
#mb{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.mt{font-size:16px;font-weight:800;color:#1a2e1e;font-family:Georgia,serif;}
.bc{background:#e8f0ea;border:none;border-radius:7px;padding:5px 12px;font-weight:700;color:#3d5c42;font-size:14px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;color:#7a9c82;margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px;}
.field input,.field select{width:100%;background:#f4f8f5;border:1px solid #e8f0ea;border-radius:7px;padding:9px 12px;font-size:13px;color:#1a2e1e;outline:none;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ma{display:flex;gap:10px;margin-top:18px;}
.bs{flex:1;background:linear-gradient(135deg,#1a7a2e,#0d73c8);border:none;border-radius:8px;padding:12px;color:#fff;font-weight:700;font-size:14px;}
.bs:disabled{background:#ccc;cursor:not-allowed;}
.bca{background:#e8f0ea;border:none;border-radius:8px;padding:12px 18px;color:#3d5c42;font-weight:600;font-size:14px;}
#toast{display:none;position:fixed;top:16px;right:16px;z-index:9999;padding:11px 18px;border-radius:10px;font-weight:700;font-size:13px;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:280px;left:16px;}
#footer{text-align:center;padding:12px 16px;background:#fff;border-top:1px solid #e8f0ea;font-size:11px;color:#7a9c82;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
#footer img{height:20px;opacity:.5;vertical-align:middle;}
#install-banner{display:none;position:fixed;bottom:16px;left:16px;right:16px;background:#1a7a2e;color:#fff;border-radius:14px;padding:14px 16px;z-index:8888;flex-direction:row;align-items:center;justify-content:space-between;box-shadow:0 8px 24px rgba(0,0,0,.25);}
</style>
</head>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API = '/.netlify/functions/api';

// ── API via proxy Netlify (sem CORS) ─────────────────────────────────────────
async function sbFetch(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + '?path=' + encodeURIComponent(path), opts);
  if (!res.ok) { const t=await res.text(); throw new Error(res.status+': '+t); }
  const t = await res.text(); return t ? JSON.parse(t) : [];
}

    loadPanel(currentPanel);
  } catch(e) {
    el.textContent = '⚠️ Offline'; el.style.color='#d97706';
    showToast('Erro de conexão: '+e.message,'error');
    // Try loading anyway
    loadPanel(currentPanel);
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmtDate(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function getStatus(v){
  if(!v)return null;
  const t=new Date();t.setHours(0,0,0,0);
  const e=new Date(v+'T00:00:00');
  const d=Math.ceil((e-t)/86400000);
  if(d<0)   return{label:'VENCIDO',color:'#dc2626',bg:'#fef2f2',border:'#fca5a5',days:d};
  if(d<=30) return{label:'ATENÇÃO',color:'#d97706',bg:'#fffbeb',border:'#fcd34d',days:d};
  return         {label:'VÁLIDO', color:'#1a7a2e',bg:'#f0fdf4',border:'#86efac',days:d};
}
function badgeHtml(v){
  const s=getStatus(v);if(!s)return'';
  const txt=s.label==='VENCIDO'?'Vencido há '+Math.abs(s.days)+'d':s.label==='ATENÇÃO'?'Vence em '+s.days+'d':s.days+' dias';
  return '<span class="badge" style="background:'+s.bg+';color:'+s.color+';border-color:'+s.border+'">'+txt+'</span>';
}
function barColor(v){const s=getStatus(v);return s?.label==='VENCIDO'?'#dc2626':s?.label==='ATENÇÃO'?'#d97706':'#1a7a2e';}
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.style.background=type==='success'?'#1a7a2e':type==='warn'?'#d97706':type==='error'?'#dc2626':'#2563eb';
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}
function summaryHtml(items){
  const venc=items.filter(i=>getStatus(i.validade)?.label==='VENCIDO').length;
  const aten=items.filter(i=>getStatus(i.validade)?.label==='ATENÇÃO').length;
  const val=items.filter(i=>getStatus(i.validade)?.label==='VÁLIDO').length;
  return '<div class="summary">'+[
    {l:'Total',v:items.length,c:'#0d73c8'},
    {l:'Válidos',v:val,c:'#1a7a2e'},
    {l:'Atenção',v:aten,c:'#d97706'},
    {l:'Vencidos',v:venc,c:'#dc2626'},
  ].map(x=>'<div class="sc" style="background:'+x.c+'18;border:1px solid '+x.c+'33"><div class="sv" style="color:'+x.c+'">'+x.v+'</div><div class="sl" style="color:'+x.c+'">'+x.l+'</div></div>').join('')+'</div>';
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentPanel='vias', currentEdit=null, allItems={vias:[],equip:[],sst:[]};

// ── Panel switch ──────────────────────────────────────────────────────────────
function switchPanel(p){
  currentPanel=p;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['vias','equip','sst'][i]===p));
  renderPanel();
  loadPanel(p);
}
async function loadPanel(p){
  const map={vias:'vias?select=*&order=validade.asc',equip:'equipamentos?select=*&order=validade.asc',sst:'sst?select=*&order=validade.asc'};
  try{allItems[p]=await sbFetch(map[p]);renderPanel();}
  catch(e){showToast('Erro ao carregar','error');}
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPanel(){
  const p=currentPanel, items=allItems[p]||[];
  const q=(document.getElementById('sq')||{}).value||'';
  const filtered=items.filter(i=>{
    const txt=p==='vias'?[i.tipo,i.numero,i.responsavel,i.orgao].join(' '):p==='equip'?[i.equip,i.serie,i.lab,i.fabricante].join(' '):[i.nome,i.funcao,i.nr,i.treinamento].join(' ');
    return txt.toLowerCase().includes(q.toLowerCase());
  });
  const cfg={
    vias:{icon:'🛣️',title:'Autorizações de Vias',color:'#1a7a2e'},
    equip:{icon:'🔧',title:'Equipamentos Calibrados',color:'#0d73c8'},
    sst:{icon:'🦺',title:'SST – Habilitações NR',color:'#d97706'}
  }[p];
  let h=summaryHtml(items);
  h+='<div class="ph"><div class="pt">';
  h+='<div style="display:flex;align-items:center;gap:10px"><div class="pi" style="background:'+cfg.color+'">'+cfg.icon+'</div>';
  h+='<div><div class="pti">'+cfg.title+'</div><div class="pts"><span style="color:#10b981">●</span> Banco compartilhado · <span style="cursor:pointer;color:#0d73c8" onclick="loadPanel(''+p+'')">↻</span></div></div></div>';
  h+='<button class="btn-add" style="background:'+cfg.color+'" onclick="openAdd()">+ Novo</button>';
  h+='</div><input class="sb" id="sq" placeholder="🔍  Buscar..." value="'+q+'" oninput="renderPanel()"/></div>';
  if(filtered.length===0){h+='<div class="empty"><div style="font-size:32px;margin-bottom:8px">📭</div><div style="font-weight:600">Nenhum registro</div></div>';}
  else filtered.forEach(item=>{
    const bc=barColor(item.validade);
    h+='<div class="card" style="border-left-color:'+bc+'">';
    h+='<div class="cr"><div class="cl"><div class="ct">';
    if(p==='vias'){
      h+='<span class="tag" style="background:#e8f0ea;color:#1a7a2e">'+(item.tipo||'')+'</span>'+badgeHtml(item.validade);
      h+='</div><div class="cn">'+(item.numero||'')+'</div>';
      h+='<div class="cs">🏛️ '+(item.orgao||'')+' · 👤 '+(item.responsavel||'')+'</div>';
      if(item.obs)h+='<div class="cn2">'+item.obs+'</div>';
    }else if(p==='equip'){
      h+='<span class="tag" style="background:#eff8ff;color:#0d73c8">Calibração</span>'+badgeHtml(item.validade);
      h+='</div><div class="cn">'+(item.equip||'')+'</div>';
      h+='<div class="cs">🏭 '+(item.fabricante||'')+' · Série: <b>'+(item.serie||'')+'</b></div>';
      h+='<div class="cn2">📜 '+(item.cert||'')+' · 🔬 '+(item.lab||'')+'</div>';
    }else{
      const nc=(item.nr||'').includes('35')||(item.nr||'').includes('33')?'#dc2626':(item.nr||'').includes('10')?'#d97706':'#1a7a2e';
      h+='<span class="tag" style="background:'+nc+'18;color:'+nc+';border:1px solid '+nc+'33">'+(item.nr||'')+'</span>'+badgeHtml(item.validade);
      h+='</div><div class="cn">'+(item.nome||'')+'</div>';
      h+='<div class="cs">💼 '+(item.funcao||'')+'</div>';
      h+='<div class="cs">📚 '+(item.treinamento||'')+'</div>';
      if(item.instituicao)h+='<div class="cn2">🏫 '+item.instituicao+'</div>';
    }
    h+='</div><div class="cri">';
    if(p==='equip'){h+='<div class="dl">Próx. calibração:</div><div class="dv">'+fmtDate(item.prox_cal)+'</div>';}
    else{h+='<div class="dl">Emissão: '+fmtDate(item.emissao)+'</div><div class="dv">Vence: '+fmtDate(item.validade)+'</div>';}
    h+='<div class="ca"><button class="be" onclick='openEdit('+JSON.stringify(JSON.stringify(item))+')'> ✏️</button>';
    h+='<button class="bd" onclick="delRecord('+item.id+')">🗑️</button></div>';
    h+='</div></div></div>';
  });
  document.getElementById('content').innerHTML=h;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openAdd(){currentEdit=null;document.getElementById('mtitle').textContent='➕ Novo Registro';document.getElementById('mbody').innerHTML=formHtml(currentPanel,null);document.getElementById('mo').classList.add('open');}
function openEdit(js){currentEdit=JSON.parse(js);document.getElementById('mtitle').textContent='✏️ Editar';document.getElementById('mbody').innerHTML=formHtml(currentPanel,currentEdit);document.getElementById('mo').classList.add('open');}
function closeModal(){document.getElementById('mo').classList.remove('open');currentEdit=null;}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});

function formHtml(p,item){
  const v=f=>(item&&item[f])||'';
  let h='';
  if(p==='vias'){
    const T=['AET - Carga Especial','Autorização de Escavação','Interdição Parcial de Via','Licença de Obra','Autorização de Transporte','Alvará de Interferência','Outros'];
    h+='<div class="field"><label>Tipo</label><select id="f0">'+T.map(t=>'<option'+(v('tipo')===t?' selected':'')+'>'+t+'</option>').join('')+'</select></div>';
    h+='<div class="field"><label>Número / Protocolo *</label><input id="f1" value="'+v('numero')+'" placeholder="Ex: AET-2024-0087"/></div>';
    h+='<div class="field"><label>Órgão Emissor *</label><input id="f2" value="'+v('orgao')+'" placeholder="Ex: DER-SP"/></div>';
    h+='<div class="field"><label>Responsável</label><input id="f3" value="'+v('responsavel')+'" placeholder="Ex: Eng. Carlos Silva"/></div>';
    h+='<div class="fr"><div class="field"><label>Emissão</label><input id="f4" type="date" value="'+v('emissao')+'"/></div>';
    h+='<div class="field"><label>Validade *</label><input id="f5" type="date" value="'+v('validade')+'"/></div></div>';
    h+='<div class="field"><label>Observações</label><input id="f6" value="'+v('obs')+'" placeholder="Local, trecho..."/></div>';
  }else if(p==='equip'){
    h+='<div class="field"><label>Equipamento *</label><input id="f0" value="'+v('equip')+'" placeholder="Ex: Manômetro #007"/></div>';
    h+='<div class="fr"><div class="field"><label>Fabricante</label><input id="f1" value="'+v('fabricante')+'" placeholder="Ex: Wika"/></div>';
    h+='<div class="field"><label>Nº de Série *</label><input id="f2" value="'+v('serie')+'" placeholder="Ex: WK-20481"/></div></div>';
    h+='<div class="field"><label>Certificado</label><input id="f3" value="'+v('cert')+'" placeholder="Ex: RLAM-2024-007"/></div>';
    h+='<div class="field"><label>Laboratório</label><input id="f4" value="'+v('lab')+'" placeholder="Ex: Lab. Metrologia"/></div>';
    h+='<div class="fr"><div class="field"><label>Validade Cert. *</label><input id="f5" type="date" value="'+v('validade')+'"/></div>';
    h+='<div class="field"><label>Próx. Calibração</label><input id="f6" type="date" value="'+v('prox_cal')+'"/></div></div>';
  }else{
    const N=['NR-6 EPI','NR-10 SEP','NR-10 Básico','NR-12 Máquinas','NR-18 Construção','NR-20 Inflamáveis','NR-33 Espaço Confinado','NR-35 Trabalho em Altura','Outros'];
    h+='<div class="field"><label>Colaborador *</label><input id="f0" value="'+v('nome')+'" placeholder="Nome completo"/></div>';
    h+='<div class="field"><label>Função / Cargo</label><input id="f1" value="'+v('funcao')+'" placeholder="Ex: Eletricista"/></div>';
    h+='<div class="field"><label>Norma</label><select id="f2">'+N.map(n=>'<option'+(v('nr')===n?' selected':'')+'>'+n+'</option>').join('')+'</select></div>';
    h+='<div class="field"><label>Treinamento *</label><input id="f3" value="'+v('treinamento')+'" placeholder="Ex: NR-35 Trabalho em Altura"/></div>';
    h+='<div class="field"><label>Instituição</label><input id="f4" value="'+v('instituicao')+'" placeholder="Ex: SENAI-SP"/></div>';
    h+='<div class="fr"><div class="field"><label>Emissão</label><input id="f5" type="date" value="'+v('emissao')+'"/></div>';
    h+='<div class="field"><label>Validade *</label><input id="f6" type="date" value="'+v('validade')+'"/></div></div>';
  }
  return h;
}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}

async function saveRecord(){
  const btn=document.getElementById('bsave');
  btn.disabled=true;btn.textContent='Salvando...';
  try{
    const p=currentPanel;
    let payload,table;
    if(p==='vias'){
      if(!gv('f1')||!gv('f2')||!gv('f5')){showToast('Preencha os campos obrigatórios','warn');btn.disabled=false;btn.textContent='Salvar';return;}
      payload={tipo:gv('f0'),numero:gv('f1'),orgao:gv('f2'),responsavel:gv('f3'),emissao:gv('f4'),validade:gv('f5'),obs:gv('f6')};table='vias';
    }else if(p==='equip'){
      if(!gv('f0')||!gv('f2')||!gv('f5')){showToast('Preencha os campos obrigatórios','warn');btn.disabled=false;btn.textContent='Salvar';return;}
      payload={equip:gv('f0'),fabricante:gv('f1'),serie:gv('f2'),cert:gv('f3'),lab:gv('f4'),validade:gv('f5'),prox_cal:gv('f6')};table='equipamentos';
    }else{
      if(!gv('f0')||!gv('f3')||!gv('f6')){showToast('Preencha os campos obrigatórios','warn');btn.disabled=false;btn.textContent='Salvar';return;}
      payload={nome:gv('f0'),funcao:gv('f1'),nr:gv('f2'),treinamento:gv('f3'),instituicao:gv('f4'),emissao:gv('f5'),validade:gv('f6')};table='sst';
    }
    if(currentEdit){await sbFetch(table+'?id=eq.'+currentEdit.id,'PATCH',payload);showToast('Atualizado ✓','success');}
    else{await sbFetch(table,'POST',payload);showToast('Adicionado ✓','success');}
    closeModal();
    await loadPanel(p);
  }catch(e){showToast('Erro: '+e.message,'error');}
  btn.disabled=false;btn.textContent='Salvar';
}

async function delRecord(id){
  if(!confirm('Confirmar exclusão?'))return;
  const map={vias:'vias',equip:'equipamentos',sst:'sst'};
  try{
    await sbFetch(map[currentPanel]+'?id=eq.'+id,'DELETE');
    allItems[currentPanel]=allItems[currentPanel].filter(i=>i.id!==id);
    renderPanel();showToast('Removido','info');
  }catch(e){showToast('Erro ao remover','error');}
}

  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  setTimeout(()=>{if(deferredPrompt)document.getElementById('install-banner').style.display='flex';},5000);
});
async function installApp(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').style.display='none';
  if(outcome==='accepted')showToast('App instalado! ✓','success');
}
